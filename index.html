<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinci · Dossiê de Migração · TOTVS Cloud</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root {
  --bg: #f5f4f1;
  --surface: #ffffff;
  --surface-2: #f0efe9;
  --border: #e2e0d8;
  --border-2: #cccac0;
  --ink: #1a1916;
  --ink-2: #3d3c38;
  --ink-3: #7a7870;
  --ink-4: #a8a69e;
  --blue: #1a3a5c;
  --blue-light: #e8f0f8;
  --blue-mid: #2d5a8e;
  --orange: #c84b0f;
  --orange-light: #fdf0eb;
  --amber: #b07d1a;
  --amber-light: #fdf6e3;
  --teal: #1a6b5a;
  --teal-light: #e8f5f1;
  --sidebar-w: 220px;
  --header-h: 56px;
}
[data-theme="dark"] {
  --bg: #0f0f0e;
  --surface: #1a1917;
  --surface-2: #242320;
  --border: #2e2c28;
  --border-2: #3e3c37;
  --ink: #f0ede6;
  --ink-2: #c8c5bc;
  --ink-3: #7a7870;
  --ink-4: #4e4d49;
  --blue: #2563a8;
  --blue-light: #0f1f36;
  --blue-mid: #4a86c8;
  --orange: #e06030;
  --orange-light: #2a1408;
  --amber: #c8941a;
  --amber-light: #241a06;
  --teal: #1a9b7a;
  --teal-light: #081e18;
}
[data-theme="dark"] .header { background: #111210; }
[data-theme="dark"] .login-screen { background: #111210; }
[data-theme="dark"] thead { background: var(--surface-2); }
[data-theme="dark"] tr.data-row:hover td,
[data-theme="dark"] tr.data-row.expanded td { background: var(--blue-light); }
[data-theme="dark"] .hit-code { background: var(--surface-2); }
[data-theme="dark"] .modal-box { box-shadow: 0 16px 48px rgba(0,0,0,0.6); }

/* DARK MODE TOGGLE */
.theme-btn{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:6px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.06);cursor:pointer;color:rgba(255,255,255,0.65);transition:all 0.15s;flex-shrink:0;}
.theme-btn:hover{background:rgba(255,255,255,0.12);color:white;border-color:rgba(255,255,255,0.2);}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;}
[data-theme="dark"] body{font-weight:350;}
.mono{font-family:'DM Mono',monospace;}

/* LAYOUT */
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;grid-template-rows:var(--header-h) 1fr;height:100vh;overflow:hidden;}

/* HEADER */
.header{grid-column:1/-1;background:var(--blue);display:flex;align-items:center;justify-content:space-between;padding:0 24px 0 0;border-bottom:1px solid rgba(255,255,255,0.08);z-index:50;}
.header-brand{display:flex;align-items:center;gap:0;width:var(--sidebar-w);padding:0 20px;border-right:1px solid rgba(255,255,255,0.1);height:100%;}
.header-logo{width:28px;height:28px;background:var(--orange);display:flex;align-items:center;justify-content:center;border-radius:4px;margin-right:12px;flex-shrink:0;}
.header-logo svg{width:16px;height:16px;fill:white;}
.header-title{font-size:13px;font-weight:600;color:white;letter-spacing:0.01em;}
.header-subtitle{font-size:10px;color:rgba(255,255,255,0.45);letter-spacing:0.05em;text-transform:uppercase;margin-top:1px;}
.header-meta{display:flex;align-items:center;gap:24px;}
.header-tag{font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,0.45);letter-spacing:0.08em;text-transform:uppercase;}
.header-tag b{color:rgba(255,255,255,0.78);font-weight:400;}
.header-totvs{display:flex;flex-direction:row;align-items:center;gap:10px;padding:0 24px;border-left:1px solid rgba(255,255,255,0.1);border-right:1px solid rgba(255,255,255,0.1);}
.header-totvs-sub{font-family:'DM Sans',sans-serif;font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:0.06em;text-transform:uppercase;white-space:nowrap;}
.status-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;margin-right:6px;display:inline-block;box-shadow:0 0 0 2px rgba(74,222,128,0.3);animation:pulse 2.5s ease infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 2px rgba(74,222,128,0.3);}50%{box-shadow:0 0 0 5px rgba(74,222,128,0.1);}}
@keyframes spin{to{transform:rotate(360deg);}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:center;justify-content:center;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:28px 32px;max-width:380px;width:90%;box-shadow:0 16px 48px rgba(0,0,0,0.18);}
.modal-title{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:6px;}
.modal-sub{font-size:13px;color:var(--ink-3);margin-bottom:20px;line-height:1.5;}
.modal-input{width:100%;background:var(--surface-2);border:1px solid var(--border-2);border-radius:6px;padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);outline:none;margin-bottom:14px;}
.modal-input:focus{border-color:var(--blue-mid);}
.modal-btn{width:100%;padding:10px;background:var(--blue);color:white;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;}

/* LOGIN */
.login-screen{min-height:100vh;background:var(--blue);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.login-card{background:var(--surface);border-radius:12px;padding:40px;max-width:400px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,0.3);}
.login-brand{display:flex;align-items:center;gap:12px;margin-bottom:32px;}
.login-logo{width:36px;height:36px;background:var(--orange);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.login-logo svg{width:20px;height:20px;fill:white;}
.login-brand-text{display:flex;flex-direction:column;}
.login-brand-title{font-size:14px;font-weight:600;color:var(--ink);}
.login-brand-sub{font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:0.06em;}
.login-heading{font-size:20px;font-weight:600;color:var(--ink);margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--ink-3);margin-bottom:24px;line-height:1.5;}
.login-label{font-size:12px;font-weight:500;color:var(--ink-2);margin-bottom:6px;display:block;}
.login-input{width:100%;background:var(--surface-2);border:1px solid var(--border-2);border-radius:6px;padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);outline:none;margin-bottom:16px;}
.login-input:focus{border-color:var(--blue-mid);}
.login-btn{width:100%;padding:11px;background:var(--blue);color:white;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:opacity 0.15s;}
.login-btn:disabled{opacity:0.6;cursor:not-allowed;}
.login-error{font-size:13px;color:var(--orange);margin-top:10px;text-align:center;}

/* SIDEBAR */
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:16px 0;overflow-y:auto;display:flex;flex-direction:column;gap:2px;}
.nav-section-label{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-4);padding:16px 16px 6px;margin-top:4px;}
.nav-section-label:first-child{margin-top:0;}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;border-radius:0;transition:all 0.15s;color:var(--ink-2);font-size:14px;font-weight:400;border-left:2px solid transparent;user-select:none;}
.nav-item:hover{background:var(--surface-2);color:var(--ink);}
.nav-item.active{background:var(--blue-light);color:var(--blue);font-weight:500;border-left-color:var(--blue);}
.nav-item .nav-icon{width:16px;height:16px;opacity:0.6;flex-shrink:0;}
.nav-item.active .nav-icon{opacity:1;}
.nav-badge{margin-left:auto;font-family:'DM Mono',monospace;font-size:10px;background:var(--surface-2);color:var(--ink-3);padding:1px 6px;border-radius:10px;font-weight:400;}
.nav-item.active .nav-badge{background:var(--blue);color:white;}
.nav-badge.danger{background:var(--orange-light);color:var(--orange);}
.nav-item.active .nav-badge.danger{background:var(--orange);color:white;}

/* MAIN */
.main{overflow-y:auto;background:var(--bg);}
.view{display:none;padding:28px;}
.view.active{display:block;animation:fadeUp 0.2s ease forwards;opacity:1;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* PAGE HEADER */
.page-header{margin-bottom:24px;}
.page-header h1{font-size:22px;font-weight:600;color:var(--ink);letter-spacing:-0.01em;}
.page-header p{font-size:13px;color:var(--ink-3);margin-top:4px;}
.breadcrumb{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink-4);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px 20px;position:relative;transition:box-shadow 0.2s;}
.kpi:hover{box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.kpi-label{font-size:12px;font-weight:500;color:var(--ink-3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;}
.kpi-value{font-family:'DM Mono',monospace;font-size:28px;font-weight:400;color:var(--ink);line-height:1;letter-spacing:-0.02em;}
.kpi-value.danger{color:var(--orange);}
.kpi-value.amber{color:var(--amber);}
.kpi-value.teal{color:var(--teal);}
.kpi-value.blue{color:var(--blue-mid);}
.kpi-sub{font-size:11px;color:var(--ink-4);margin-top:6px;}
.kpi-ix{position:absolute;top:14px;right:16px;font-family:'DM Mono',monospace;font-size:9px;color:var(--ink-4);letter-spacing:0.08em;}

/* SECTION CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:20px;overflow:hidden;}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:14px;font-weight:600;color:var(--ink);}
.card-subtitle{font-size:12px;color:var(--ink-4);margin-top:2px;}
.card-body{padding:20px;}
.card-actions{display:flex;gap:8px;align-items:center;}

/* MODULE GRID */
.mod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1px;background:var(--border);}
.mod-card{background:var(--surface);padding:20px;cursor:pointer;transition:background 0.15s;position:relative;}
.mod-card:hover{background:var(--blue-light);}
.mod-card.selected{background:var(--blue-light);outline:2px solid var(--blue);outline-offset:-2px;}
.mod-name{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:2px;}
.mod-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink-4);margin-bottom:14px;letter-spacing:0.04em;}
.mod-bar{height:4px;background:var(--surface-2);border-radius:2px;overflow:hidden;margin-bottom:12px;display:flex;}
.mod-bar-seg{height:100%;}
.mod-stats{display:flex;justify-content:space-between;align-items:flex-end;}
.mod-stat-val{font-family:'DM Mono',monospace;font-size:20px;font-weight:400;color:var(--ink);line-height:1;}
.mod-stat-val.danger{color:var(--orange);}
.mod-stat-val.zero{color:var(--ink-4);}
.mod-stat-lbl{font-size:10px;color:var(--ink-4);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px;}
.mod-stat{display:flex;flex-direction:column;}
.mod-stat.right{align-items:flex-end;}
.mod-arrow{position:absolute;top:50%;right:16px;transform:translateY(-50%);opacity:0;transition:opacity 0.15s;color:var(--blue);}
.mod-card:hover .mod-arrow{opacity:1;}

/* HARDCODE CATEGORY */
.hc-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);}
.hc-row{background:var(--surface);padding:14px 18px;cursor:pointer;transition:background 0.15s;display:grid;grid-template-columns:1fr auto auto;gap:16px;align-items:center;}
.hc-row:hover .hc-name{color:var(--blue);}
.cat-filter-pill{display:inline-flex;align-items:center;gap:8px;background:var(--blue-light);color:var(--blue);font-family:'DM Mono',monospace;font-size:11px;font-weight:500;padding:6px 12px;border-radius:6px;border:1px solid var(--blue);letter-spacing:0.04em;}
.cat-filter-pill .x{cursor:pointer;font-size:14px;line-height:1;opacity:0.7;}
.cat-filter-pill .x:hover{opacity:1;}
.hc-row:hover{background:var(--surface-2);}
.hc-name{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--ink);letter-spacing:0.04em;}
.hc-bars{display:flex;height:20px;gap:2px;align-items:center;}
.hc-seg{display:block;border-radius:1px;}
.hc-total{font-family:'DM Mono',monospace;font-size:20px;font-weight:400;color:var(--ink);text-align:right;min-width:32px;}

/* SEVERITY PILLS */
.sev{display:inline-flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;padding:2px 8px;border-radius:4px;letter-spacing:0.04em;text-transform:uppercase;}
.sev.alta{background:var(--orange-light);color:var(--orange);}
.sev.media{background:var(--amber-light);color:var(--amber);}
.sev.baixa{background:var(--teal-light);color:var(--teal);}

/* TABLE */
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.search-wrap{flex:1;min-width:200px;position:relative;}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink-4);pointer-events:none;}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 12px 8px 34px;border-radius:6px;outline:none;transition:border-color 0.15s;}
.search-wrap input:focus{border-color:var(--blue-mid);}
.search-wrap input::placeholder{color:var(--ink-4);}
.select-wrap select{background:var(--surface);border:1px solid var(--border);color:var(--ink-2);font-family:'DM Sans',sans-serif;font-size:12px;padding:8px 12px;border-radius:6px;outline:none;cursor:pointer;}
.filter-pills{display:flex;gap:4px;}
.filter-pill{font-size:11px;font-weight:500;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--ink-3);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.filter-pill:hover{background:var(--surface-2);border-color:var(--border-2);}
.filter-pill.active{background:var(--blue);color:white;border-color:var(--blue);}
.filter-pill.active.danger{background:var(--orange);border-color:var(--orange);}
.tbl-wrap{border:1px solid var(--border);border-radius:8px;overflow:auto;max-height:620px;}
table{width:100%;border-collapse:collapse;}
thead{position:sticky;top:0;z-index:5;background:var(--surface-2);}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:var(--ink-3);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;}
th:hover{color:var(--blue);}
th.sorted{color:var(--blue);}
td{padding:10px 14px;font-size:13px;color:var(--ink-2);border-bottom:1px solid var(--surface-2);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr.data-row{cursor:pointer;transition:background 0.1s;}
tr.data-row:hover td{background:var(--blue-light);}
tr.data-row.expanded td{background:var(--blue-light);}
tr.detail-row td{background:var(--surface-2);padding:16px 20px;}
.file-name{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--ink);}
.file-func{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink-4);margin-top:2px;}
.file-path{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink-4);margin-top:1px;}
.loc-val{font-family:'DM Mono',monospace;font-size:13px;text-align:right;}
.badges{display:flex;gap:4px;flex-wrap:wrap;}
.chevron{transition:transform 0.2s;display:inline-flex;color:var(--ink-4);}
.expanded .chevron{transform:rotate(90deg);}

/* HITS DETAIL */
.hits-header{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink-4);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;}
.hit-item{display:grid;grid-template-columns:60px 140px 80px 1fr;gap:12px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:12px;}
.hit-item:last-child{border-bottom:none;}
.hit-line{color:var(--ink-4);}
.hit-cat{color:var(--ink-2);font-weight:500;}
.hit-code{background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:2px 8px;color:var(--ink);font-size:10px;word-break:break-all;border-left:2px solid var(--orange);}

/* TYPE BARS */
.type-bars{display:flex;flex-direction:column;gap:10px;}
.type-row{display:grid;grid-template-columns:180px 1fr 50px;gap:16px;align-items:center;}
.type-name{font-size:12px;color:var(--ink-2);}
.type-bar-track{height:8px;background:var(--surface-2);border-radius:4px;overflow:hidden;}
.type-bar-fill{height:100%;background:var(--blue-mid);border-radius:4px;transition:width 0.6s ease;}
.type-qty{font-family:'DM Mono',monospace;font-size:12px;color:var(--ink-3);text-align:right;}

/* OVERVIEW CHARTS */
.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
.donut-wrap{display:flex;align-items:center;gap:24px;}
.donut-legend{display:flex;flex-direction:column;gap:10px;}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-2);}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.legend-val{font-family:'DM Mono',monospace;font-size:12px;color:var(--ink);margin-left:auto;}

/* TOP FILES */
.top-list{display:flex;flex-direction:column;gap:0;}
.top-item{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid var(--surface-2);}
.top-item:last-child{border-bottom:none;}
.top-file{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink-2);}
.top-bar-wrap{display:flex;align-items:center;gap:8px;}
.top-bar-track{width:80px;height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden;}
.top-bar-fill{height:100%;background:var(--orange);border-radius:3px;}
.top-val{font-family:'DM Mono',monospace;font-size:12px;color:var(--orange);font-weight:500;min-width:20px;text-align:right;}

/* SUMMARY PANEL */
.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.summary-block{background:var(--surface-2);border-radius:6px;padding:16px;}
.summary-block h4{font-size:11px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);}
.summary-row:last-child{border-bottom:none;}
.summary-key{font-size:12px;color:var(--ink-2);}
.summary-val{font-family:'DM Mono',monospace;font-size:12px;color:var(--ink);font-weight:500;}

/* TAGS */
.tag{display:inline-flex;align-items:center;font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;background:var(--surface-2);color:var(--ink-3);font-family:'DM Mono',monospace;letter-spacing:0.03em;}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:3px;}

/* RESPONSIVE */
@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(3,1fr);}.overview-grid{grid-template-columns:1fr;}}
@media(max-width:768px){.app{grid-template-columns:1fr;}.sidebar{display:none;}.kpi-grid{grid-template-columns:repeat(2,1fr);}}

/* EMPTY STATE */
.empty{text-align:center;padding:48px 24px;color:var(--ink-4);}
.empty p{font-size:13px;margin-top:8px;}

/* DECISION VIEW */
.decision-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;}
.dec-stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 18px;}
.dec-stat-label{font-size:10px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
.dec-stat-value{font-family:'DM Mono',monospace;font-size:22px;font-weight:400;color:var(--ink);line-height:1;}
.dec-stat-value.keep{color:var(--teal);}
.dec-stat-value.drop{color:var(--orange);}
.dec-stat-value.pending{color:var(--ink-3);}
.dec-stat-value.eval{color:var(--amber);}
.dec-stat-sub{font-size:10px;color:var(--ink-4);margin-top:4px;}
.progress-track{height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden;display:flex;margin-top:6px;}
.progress-fill{height:100%;}
.dec-tools{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.dec-btn{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:500;padding:7px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--ink-2);cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif;}
.dec-btn:hover{background:var(--surface-2);}
.dec-btn.keep{color:var(--teal);border-color:var(--teal);}
.dec-btn.keep:hover{background:var(--teal-light);}
.dec-btn.drop{color:var(--orange);border-color:var(--orange);}
.dec-btn.drop:hover{background:var(--orange-light);}
.dec-btn.primary{background:var(--blue);color:white;border-color:var(--blue);}
.dec-btn.primary:hover{background:var(--blue-mid);}
.dec-checkbox{width:16px;height:16px;border:1.5px solid var(--border-2);border-radius:3px;background:var(--surface);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
.dec-checkbox.checked{background:var(--blue);border-color:var(--blue);color:white;}
.dec-checkbox:hover{border-color:var(--blue);}
.dec-row-actions{display:flex;gap:4px;align-items:center;}
.dec-action-btn{width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;border-radius:5px;border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--ink-3);transition:all 0.15s;}
.dec-action-btn:hover{border-color:var(--border-2);}
.dec-action-btn.keep.active{background:var(--teal);border-color:var(--teal);color:white;}
.dec-action-btn.drop.active{background:var(--orange);border-color:var(--orange);color:white;}
.dec-action-btn.eval.active{background:var(--amber);border-color:var(--amber);color:white;}
.dec-action-btn:not(.active):hover.keep{color:var(--teal);border-color:var(--teal);}
.dec-action-btn:not(.active):hover.drop{color:var(--orange);border-color:var(--orange);}
.dec-action-btn:not(.active):hover.eval{color:var(--amber);border-color:var(--amber);}
.dec-status-pill{position:relative;display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:500;padding:2px 8px;border-radius:4px;letter-spacing:0.04em;text-transform:uppercase;font-family:'DM Mono',monospace;cursor:default;}
.dec-status-pill.keep{background:var(--teal-light);color:var(--teal);}
.dec-status-pill.drop{background:var(--orange-light);color:var(--orange);}
.dec-status-pill.eval{background:var(--amber-light);color:var(--amber);}
.dec-status-pill.pending{background:var(--surface-2);color:var(--ink-4);}
.dec-tooltip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1a1916;color:#fff;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:400;letter-spacing:0;text-transform:none;white-space:nowrap;padding:6px 10px;border-radius:5px;pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:100;line-height:1.5;}
.dec-tooltip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:#1a1916;}
.dec-status-pill:hover .dec-tooltip{opacity:1;}
.dec-note{font-size:11px;color:var(--ink-3);background:var(--blue-light);border-left:3px solid var(--blue);padding:10px 14px;border-radius:4px;margin-bottom:14px;}

/* ISSUE BADGES */
.issue-prio{display:inline-flex;align-items:center;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;padding:2px 8px;border-radius:4px;letter-spacing:0.04em;text-transform:uppercase;}
.issue-prio.alta{background:var(--orange-light);color:var(--orange);}
.issue-prio.media{background:var(--amber-light);color:var(--amber);}
.issue-prio.baixa{background:var(--teal-light);color:var(--teal);}
.issue-status{display:inline-flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;padding:2px 8px;border-radius:4px;letter-spacing:0.04em;text-transform:uppercase;}
.issue-status.aberto{background:var(--blue-light);color:var(--blue);}
.issue-status.analise{background:var(--amber-light);color:var(--amber);}
.issue-status.cliente{background:var(--orange-light);color:var(--orange);}
.issue-status.concluido{background:var(--teal-light);color:var(--teal);}
.issue-tipo{display:inline-flex;align-items:center;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;padding:2px 8px;border-radius:4px;letter-spacing:0.04em;}
.issue-tipo.sustentacao{background:var(--surface-2);color:var(--ink-2);border:1px solid var(--border);}
.issue-tipo.inovacao{background:var(--blue-light);color:var(--blue);border:1px solid var(--blue);}
.issue-id{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink-3);font-weight:500;letter-spacing:0.04em;}
.issue-desc{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--blue);border-radius:4px;padding:14px 18px;font-size:13px;color:var(--ink-2);line-height:1.6;white-space:pre-wrap;}

/* ALERTAS VIEW */
.alerta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:24px;}
.alerta-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px 20px;cursor:pointer;transition:all 0.15s;position:relative;border-left:3px solid var(--border-2);}
.alerta-card:hover{box-shadow:0 2px 12px rgba(0,0,0,0.07);transform:translateY(-1px);}
.alerta-card.alta{border-left-color:var(--orange);}
.alerta-card.media{border-left-color:var(--amber);}
.alerta-card.baixa{border-left-color:var(--teal);}
.alerta-card.active{outline:2px solid var(--blue);outline-offset:-1px;}
.alerta-code{font-family:'DM Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-4);margin-bottom:4px;}
.alerta-label{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:10px;line-height:1.3;}
.alerta-count{font-family:'DM Mono',monospace;font-size:28px;font-weight:400;color:var(--ink);line-height:1;}
.alerta-count.alta{color:var(--orange);}
.alerta-count.media{color:var(--amber);}
.alerta-count.baixa{color:var(--teal);}
.alerta-sub{font-size:11px;color:var(--ink-4);margin-top:4px;}
.alerta-filter-pill{display:inline-flex;align-items:center;gap:8px;background:var(--blue-light);color:var(--blue);font-family:'DM Mono',monospace;font-size:11px;font-weight:500;padding:6px 12px;border-radius:6px;border:1px solid var(--blue);letter-spacing:0.04em;}
.alerta-filter-pill .x{cursor:pointer;font-size:14px;line-height:1;opacity:0.7;}
.alerta-filter-pill .x:hover{opacity:1;}
.hit-alerta{display:grid;grid-template-columns:60px 90px 1fr;gap:12px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:11px;}
.hit-alerta:last-child{border-bottom:none;}

/* DARK THEME */
.dark{--bg:#131210;--surface:#1c1b18;--surface-2:#242320;--border:#2e2c28;--border-2:#3d3b35;--ink:#ede9e0;--ink-2:#c2bdb0;--ink-3:#8a8780;--ink-4:#5a5850;--blue:#2563a8;--blue-light:rgba(37,99,168,0.15);--blue-mid:#4a90d9;--orange:#e05a1a;--orange-light:rgba(224,90,26,0.15);--amber:#d4991f;--amber-light:rgba(212,153,31,0.15);--teal:#1d8a72;--teal-light:rgba(29,138,114,0.15);}
.dark .header{background:#0e0d0b;}
.dark .sidebar{background:var(--surface);}
</style>

const CATALOGO_TODOS = (window.CATALOGO_FULL || []).map(r => ({
  caminho: r.c, arquivo: r.a, subpasta: r.s, modulo: r.m, tipo: r.t,
  prefixo: r.p, principal: r.fn, loc: r.l, autor: r.au,

  pasta: (r.c || '').split('/')[0]
}));

// MODULOS derivado das pastas reais do repositório
if (CATALOGO_TODOS.length) {
  const map = {};
  CATALOGO_TODOS.forEach(r => {
    const p = r.pasta;
    if (!p) return;
    if (!map[p]) map[p] = { nome: p, fontes: 0, loc: 0, hc_alta: 0, hc_media: 0, hc_baixa: 0 };
    map[p].fontes++;
    map[p].loc += r.loc || 0;
    map[p].hc_alta += r.hc_alta || 0;
    map[p].hc_media += r.hc_media || 0;
    map[p].hc_baixa += r.hc_baixa || 0;
  });
  MODULOS = Object.values(map).sort((a, b) => b.fontes - a.fontes);
}

// Calcula categorias dinamicamente a partir dos hits reais de CATALOGO_TODOS,
// garantindo zero divergência com o que o Catálogo exibe ao filtrar.
// Cai para o fallback hardcoded apenas se o catalogo-full.js não estiver carregado.
const ORDEM_SEV = { alta: 0, media: 1, baixa: 2 };
const getCategorias = () => {
  if (!CATALOGO_TODOS.length) return CATALOGO_FALLBACK_OR_EMPTY();
  const map = {};
  CATALOGO_TODOS.forEach(fonte => {
    (fonte.hits || []).forEach(h => {
      const cat = h.categoria;
      if (!map[cat]) map[cat] = { nome: cat, sev: h.severidade, alta: 0, media: 0, baixa: 0, total: 0 };
      // se a categoria mistura severidades, mantém a mais grave
      if (ORDEM_SEV[h.severidade] < ORDEM_SEV[map[cat].sev]) map[cat].sev = h.severidade;
      map[cat][h.severidade]++;
      map[cat].total++;
    });
  });
  return Object.values(map).sort((a,b)=>b.total-a.total);
};
const CATALOGO_FALLBACK_OR_EMPTY = () => CATEGORIAS_FALLBACK;
const CATEGORIAS = getCategorias();

    const dA=circumf*pA, dM=circumf*pM, dB=circumf*pB;
    const offA=circumf*0.25;
    const offM=offA-dA;
    const offB=offM-dM;
    return (
      <svg width="116" height="116" viewBox="0 0 116 116" style={{flexShrink:0}}>

/* ─── CATALOG VIEW ──────────────────────────────────────────────────── */
const CatalogView = ({ initialModule, initialCategoria, onClearCategoria }) => {
  const [search, setSearch] = useState('');
  const [fMod, setFMod] = useState(initialModule || '');
  const [fTipo, setFTipo] = useState('');
  const [fSev, setFSev] = useState('');
  const [fCat, setFCat] = useState(initialCategoria || '');
  const [sortKey, setSortKey] = useState('hc_alta');
  const [sortDir, setSortDir] = useState(-1);
  const [expanded, setExpanded] = useState(new Set());

  useEffect(()=>{ setFMod(initialModule||''); },[initialModule]);
  useEffect(()=>{ setFCat(initialCategoria||''); },[initialCategoria]);

  const mods  = useMemo(()=>[...new Set(CATALOGO_TODOS.map(r=>r.pasta))].sort(),[]);
  const tipos = useMemo(()=>[...new Set(CATALOGO_TODOS.map(r=>r.subpasta||''))].filter(Boolean).sort(),[]);

  const filtered = useMemo(()=>{
    const q = search.toLowerCase();
    return CATALOGO_TODOS.filter(r=>{
      if(q && !(r.arquivo.toLowerCase().includes(q)||(r.principal||'').toLowerCase().includes(q)||(r.autor||'').toLowerCase().includes(q))) return false;
      if(fMod && r.pasta!==fMod) return false;
      if(fTipo && r.subpasta!==fTipo) return false;
      if(fSev==='alta' && r.hc_alta===0) return false;
      if(fSev==='media' && r.hc_media===0) return false;
      if(fSev==='hc' && (r.hc_alta+r.hc_media+r.hc_baixa)===0) return false;
      if(fCat){
        const hits = r.hits || [];
        if(!hits.some(h=>(h.categoria||'').toUpperCase()===fCat.toUpperCase())) return false;
      }
      return true;
    }).sort((a,b)=>{
      const x=a[sortKey],y=b[sortKey];
      return typeof x==='number'?(x-y)*sortDir:String(x).localeCompare(String(y))*sortDir;
    });
  },[search,fMod,fTipo,fSev,fCat,sortKey,sortDir]);

  const toggleExpand = id => {
    setExpanded(prev=>{
      const next=new Set(prev);
      next.has(id)?next.delete(id):next.add(id);
      return next;
    });
  };

  const setSort = key => {
    setSortDir(prev=>sortKey===key?prev*-1:(typeof CATALOGO_TODOS[0][key]==='number'?-1:1));
    setSortKey(key);
  };

  const sevPills = [
    {id:'',    label:'Todos'},
    {id:'alta',label:'Só Alta', cls:'danger'},
    {id:'media',label:'Só Média'},
    {id:'hc',  label:'Com HC'},
  ];

  return (
    <div className="view active">
      <div className="breadcrumb">Vinci · Migração → Catálogo Navegável</div>
      <div className="page-header">
        <h1>Catálogo de Fontes</h1>
        <p>Clique numa linha para ver os hits de hardcode. {fmt(STATS.total_arquivos)} fontes no total.</p>
      </div>

      {fCat && (
        <div style={{marginBottom:14,display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:11,color:'var(--ink-3)',fontFamily:'DM Mono,monospace',letterSpacing:'0.04em',textTransform:'uppercase'}}>Filtrando por categoria:</span>
          <span className="cat-filter-pill">
            {fCat.replace('_','·')}
            <span className="x" onClick={()=>{setFCat(''); onClearCategoria&&onClearCategoria();}} title="Limpar filtro">×</span>
          </span>
        </div>
      )}

      <div className="controls">
        <div className="search-wrap">
          <Icon name="search" size={14}/>
          <input placeholder="Filtrar por arquivo, função ou autor…" value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <div className="select-wrap">
          <select value={fMod} onChange={e=>setFMod(e.target.value)}>
            <option value="">Todos os módulos</option>
            {mods.map(m=><option key={m}>{m}</option>)}
          </select>
        </div>
        <div className="select-wrap">
          <select value={fTipo} onChange={e=>setFTipo(e.target.value)}>
            <option value="">Todas as subpastas</option>
            {tipos.map(t=><option key={t}>{t}</option>)}
          </select>
        </div>
        <div className="filter-pills">
          {sevPills.map(p=>(
            <button key={p.id} className={`filter-pill${fSev===p.id?' active':''}${fSev===p.id&&p.cls?' '+p.cls:''}`} onClick={()=>setFSev(p.id)}>
              {p.label}
            </button>
          ))}
        </div>
      </div>

      <div className="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th onClick={()=>setSort('arquivo')} className={sortKey==='arquivo'?'sorted':''}>Arquivo {sortKey==='arquivo'?sortDir===-1?'↓':'↑':'↕'}</th>
              <th onClick={()=>setSort('pasta')} className={sortKey==='pasta'?'sorted':''}>Pasta {sortKey==='pasta'?sortDir===-1?'↓':'↑':'↕'}</th>
              <th onClick={()=>setSort('subpasta')} className={sortKey==='subpasta'?'sorted':''}>Subpasta {sortKey==='subpasta'?sortDir===-1?'↓':'↑':'↕'}</th>
              <th>Prefixo</th>
              <th onClick={()=>setSort('loc')} className={sortKey==='loc'?'sorted':''} style={{textAlign:'right'}}>LOC {sortKey==='loc'?sortDir===-1?'↓':'↑':'↕'}</th>
              <th onClick={()=>setSort('hc_alta')} className={sortKey==='hc_alta'?'sorted':''} style={{textAlign:'center'}}>Hardcodes {sortKey==='hc_alta'?sortDir===-1?'↓':'↑':'↕'}</th>
            </tr>
          </thead>
          <tbody>
            {filtered.length===0&&(
              <tr><td colSpan="6"><div className="empty"><Icon name="search" size={24}/><p>Nenhum registro encontrado.</p></div></td></tr>
            )}
            {filtered.map(r=>{
              const id=r.caminho;
              const isOpen=expanded.has(id);
              return (
                <React.Fragment key={id}>
                  <tr className={`data-row${isOpen?' expanded':''}`} onClick={()=>toggleExpand(id)}>
                    <td>
                      <div className="file-name">{r.arquivo}</div>
                      {r.principal&&<div className="file-func">{r.principal}</div>}
                    </td>
                    <td><span className="tag">{r.pasta}</span></td>
                    <td style={{fontSize:11,color:'var(--ink-3)'}}>{r.subpasta||'—'}</td>
                    <td>{r.prefixo?<span className="tag">{r.prefixo}</span>:<span style={{color:'var(--ink-4)'}}>—</span>}</td>
                    <td className="loc-val">{fmt(r.loc)}</td>
                    <td>
                      <div style={{display:'flex',gap:4,justifyContent:'center',alignItems:'center'}}>
                        <SevBadge sev="alta" count={r.hc_alta}/>
                        <SevBadge sev="media" count={r.hc_media}/>
                        <SevBadge sev="baixa" count={r.hc_baixa}/>
                        {!r.hc_alta&&!r.hc_media&&!r.hc_baixa&&<span style={{color:'var(--ink-4)',fontSize:11}}>—</span>}
                        <span className="chevron" style={{marginLeft:4}}><Icon name="chevron" size={12}/></span>
                      </div>
                    </td>
                  </tr>
                  {isOpen&&(
                    <tr className="detail-row">
                      <td colSpan="6">
                        <div className="hits-header">{r.hits.length?`${r.hits.length} hit(s) de hardcode`:'Nenhum hardcode detectado neste fonte'}</div>
                        {r.hits.map((h,i)=>(
                          <div className="hit-item" key={i}>
                            <span className="hit-line">L{h.linha}</span>
                            <span className="hit-cat">{h.categoria}</span>
                            <SevBadge sev={h.severidade} count={1}/>
                            <div className="hit-code">{h.trecho}</div>
                          </div>
                        ))}
                        {r.autor&&<div style={{marginTop:12,fontSize:11,color:'var(--ink-4)'}}>Autor: {r.autor}</div>}
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              );
            })}
          </tbody>
        </table>
      </div>
      <div style={{marginTop:12,fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--ink-4)'}}>
        {filtered.length} de {CATALOGO_TODOS.length} fontes analisadas
      </div>
    </div>
  );
};

/* ─── ISSUES VIEW ───────────────────────────────────────────────────── */
const STATUS_CLASS = {
  'Aberto': 'aberto',
  'Em análise': 'analise',
  'Aguardando cliente': 'cliente',
  'Concluído': 'concluido',
};
const PRIO_CLASS = { 'Alta':'alta', 'Média':'media', 'Baixa':'baixa' };
const STATUS_LIST = ['Aberto','Em análise','Aguardando cliente','Concluído'];
const PRIO_LIST = ['Alta','Média','Baixa'];

const IssuesView = () => {
  const [search, setSearch] = useState('');
  const [fStatus, setFStatus] = useState('');
  const [fMod, setFMod] = useState('');
  const [fTipo, setFTipo] = useState('');
  const [expanded, setExpanded] = useState(new Set());

  const mods = useMemo(()=>[...new Set(ISSUES.map(i=>i.modulo))].sort(),[]);

  const filtered = useMemo(()=>{
    const q = search.toLowerCase();
    return ISSUES.filter(i=>{
      if(q && !((i.id||'').toLowerCase().includes(q) || (i.titulo||'').toLowerCase().includes(q) || (i.descricao||'').toLowerCase().includes(q))) return false;
      if(fStatus && i.status !== fStatus) return false;
      if(fMod && i.modulo !== fMod) return false;
      if(fTipo && i.tipo !== fTipo) return false;
      return true;
    });
  },[search,fStatus,fMod,fTipo]);

  // KPIs por status
  const byStatus = useMemo(()=>{
    const acc = { 'Aberto':0, 'Em análise':0, 'Aguardando cliente':0, 'Concluído':0 };
    ISSUES.forEach(i => { if(acc[i.status]!=null) acc[i.status]++; });
    return acc;
  },[]);

  // KPIs por prioridade
  const byPrio = useMemo(()=>{
    const acc = { 'Alta':0, 'Média':0, 'Baixa':0 };
    ISSUES.forEach(i => { if(acc[i.prioridade]!=null) acc[i.prioridade]++; });
    return acc;
  },[]);

  const total = ISSUES.length;
  const concluidos = byStatus['Concluído'];
  const pctConcluido = total ? (concluidos/total*100) : 0;

  const toggleExpand = id => {
    setExpanded(prev=>{
      const next=new Set(prev);
      next.has(id)?next.delete(id):next.add(id);
      return next;
    });
  };

  return (
    <div className="view active">
      <div className="breadcrumb">Vinci · Migração → Issues de Backlog</div>
      <div className="page-header">
        <h1>Issues de Migração</h1>
        <p>Backlog de tarefas abertas para o projeto de migração — sustentação e oportunidades de inovação. {total} issue(s) registrado(s).</p>
      </div>

      {/* KPI ROW: STATUS */}
      <div className="kpi-grid" style={{gridTemplateColumns:'repeat(5,1fr)'}}>
        <div className="kpi"><span className="kpi-ix">/01</span><div className="kpi-label">Total</div><div className="kpi-value">{total}</div><div className="kpi-sub">issues no backlog</div></div>
        <div className="kpi"><span className="kpi-ix">/02</span><div className="kpi-label">Aberto</div><div className="kpi-value blue">{byStatus['Aberto']}</div><div className="kpi-sub">aguardando triagem</div></div>
        <div className="kpi"><span className="kpi-ix">/03</span><div className="kpi-label">Em análise</div><div className="kpi-value amber">{byStatus['Em análise']}</div><div className="kpi-sub">com squad TOTVS</div></div>
        <div className="kpi"><span className="kpi-ix">/04</span><div className="kpi-label">Aguard. cliente</div><div className="kpi-value danger">{byStatus['Aguardando cliente']}</div><div className="kpi-sub">retorno Vinci</div></div>
        <div className="kpi"><span className="kpi-ix">/05</span><div className="kpi-label">Concluído</div><div className="kpi-value teal">{concluidos}</div><div className="kpi-sub">{pctConcluido.toFixed(0)}% do total</div></div>
      </div>

      {/* KPI ROW: PRIORIDADE */}
      <div className="card" style={{marginBottom:20}}>
        <div className="card-header">
          <div><div className="card-title">Distribuição por Prioridade</div><div className="card-subtitle">Severidade do impacto na migração</div></div>
        </div>
        <div className="card-body">
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
            {PRIO_LIST.map(p=>{
              const qtd = byPrio[p];
              const pct = total ? qtd/total*100 : 0;
              const cls = PRIO_CLASS[p];
              const color = cls==='alta'?'var(--orange)':cls==='media'?'var(--amber)':'var(--teal)';
              return (
                <div key={p} style={{background:'var(--surface-2)',borderRadius:6,padding:'14px 16px'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:8}}>
                    <span style={{fontSize:11,fontWeight:600,color:'var(--ink-3)',textTransform:'uppercase',letterSpacing:'0.08em'}}>Prioridade {p}</span>
                    <span className="mono" style={{fontSize:18,color}}>{qtd}</span>
                  </div>
                  <div className="progress-track" style={{marginTop:0}}>
                    <div className="progress-fill" style={{width:`${pct}%`,background:color}}></div>
                  </div>
                </div>
              );

/* ─── DECISION VIEW ─────────────────────────────────────────────────── */
const DecisionView = ({ decisions, decisionMeta, setDecision, bulkSet }) => {
  const [search, setSearch] = useState('');
  const [fMod, setFMod] = useState('');
  const [fStatus, setFStatus] = useState('');
  const [selected, setSelected] = useState(new Set());

  const mods = useMemo(()=>[...new Set(CATALOGO_TODOS.map(r=>r.modulo))].sort(),[]);

  const filtered = useMemo(()=>{
    const q = search.toLowerCase();
    return CATALOGO_TODOS.filter(r=>{
      if(q && !(r.arquivo.toLowerCase().includes(q)||(r.principal||'').toLowerCase().includes(q)||r.caminho.toLowerCase().includes(q))) return false;
      if(fMod && r.modulo!==fMod) return false;
      const status = decisions[r.caminho] || 'pending';
      if(fStatus && status!==fStatus) return false;
      return true;
    });
  },[search,fMod,fStatus,decisions]);

  const stats = useMemo(()=>{
    let keep=0, drop=0, evaluate=0;
    Object.values(decisions).forEach(s=>{
      if(s==='keep') keep++;
      else if(s==='drop') drop++;
      else if(s==='eval') evaluate++;
    });
    const total = CATALOGO_TODOS.length;
    const pending = total - keep - drop - evaluate;
    return {keep, drop, evaluate, pending, total, decided: keep+drop+evaluate};
  },[decisions]);

  const toggleSelect = id => {
    setSelected(prev=>{
      const next=new Set(prev);
      next.has(id)?next.delete(id):next.add(id);
      return next;
    });
  };

  const toggleSelectAll = () => {
    if(selected.size===filtered.length) setSelected(new Set());
    else setSelected(new Set(filtered.map(r=>r.caminho)));
  };

  const applyBulk = (status) => {
    if(selected.size===0) return;
    bulkSet([...selected], status);
    setSelected(new Set());
  };

  const exportCSV = () => {
    const header = 'caminho;arquivo;modulo;tipo;loc;hc_alta;decisao\n';
    const rows = CATALOGO_TODOS.map(r=>{
      const d = decisions[r.caminho] || 'pendente';
      const dLabel = d==='keep'?'manter':d==='drop'?'descontinuar':d==='eval'?'avaliar':'pendente';
      return `${r.caminho};${r.arquivo};${r.modulo};${r.tipo};${r.loc};${r.hc_alta};${dLabel}`;
    }).join('\n');
    const blob = new Blob(['\uFEFF'+header+rows], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `decisao-migracao-${META.data}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const clearAll = () => {
    if(confirm('Limpar todas as decisões? Esta ação não pode ser desfeita.')) bulkSet(CATALOGO_TODOS.map(r=>r.caminho), 'clear');
  };

  const pctKeep = stats.total ? stats.keep/stats.total*100 : 0;
  const pctEval = stats.total ? stats.evaluate/stats.total*100 : 0;
  const pctDrop = stats.total ? stats.drop/stats.total*100 : 0;
  const pctDecided = stats.total ? stats.decided/stats.total*100 : 0;

  return (
    <div className="view active">
      <div className="breadcrumb">Vinci · Migração → Decisão Manter × Avaliar × Descontinuar</div>
      <div className="page-header">
        <h1>Decisão de Migração</h1>
        <p>Marque cada fonte como <strong style={{color:'var(--teal)'}}>Manter</strong> (segue na migração), <strong style={{color:'var(--amber)'}}>Avaliar</strong> (requer análise) ou <strong style={{color:'var(--orange)'}}>Descontinuar</strong>. As decisões ficam salvas no navegador.</p>
        <div style={{marginTop:10,fontSize:11,color:'var(--ink-3)',fontFamily:'DM Mono,monospace',display:'flex',gap:14,flexWrap:'wrap'}}>
          <span><span style={{color:'var(--teal)',fontWeight:700}}>✓</span> Manter</span>
          <span><span style={{color:'var(--amber)',fontWeight:700}}>?</span> Avaliar</span>
          <span><span style={{color:'var(--orange)',fontWeight:700}}>✗</span> Descontinuar</span>
          <span><span style={{color:'var(--ink-4)',fontWeight:700}}>—</span> Pendente</span>
        </div>
      </div>

      {/* PROGRESS STATS */}
      <div className="decision-stats">
        <div className="dec-stat">
          <div className="dec-stat-label">Progresso</div>
          <div className="dec-stat-value">{pctDecided.toFixed(0)}<span style={{fontSize:14,color:'var(--ink-4)'}}>%</span></div>
          <div className="progress-track">
            <div className="progress-fill" style={{width:`${pctKeep}%`,background:'var(--teal)'}}></div>
            <div className="progress-fill" style={{width:`${pctEval}%`,background:'var(--amber)'}}></div>
            <div className="progress-fill" style={{width:`${pctDrop}%`,background:'var(--orange)'}}></div>
          </div>
          <div className="dec-stat-sub">{stats.decided} de {stats.total} decididos</div>
        </div>
        <div className="dec-stat">
          <div className="dec-stat-label">Manter</div>
          <div className="dec-stat-value keep">{stats.keep}</div>
          <div className="dec-stat-sub">seguem na migração</div>
        </div>
        <div className="dec-stat">
          <div className="dec-stat-label">Descontinuar</div>
          <div className="dec-stat-value drop">{stats.drop}</div>
          <div className="dec-stat-sub">não migram</div>
        </div>
        <div className="dec-stat">
          <div className="dec-stat-label">Avaliar</div>
          <div className="dec-stat-value eval">{stats.evaluate}</div>
          <div className="dec-stat-sub">requer análise</div>
        </div>
        <div className="dec-stat">
          <div className="dec-stat-label">Pendentes</div>
          <div className="dec-stat-value pending">{stats.pending}</div>
          <div className="dec-stat-sub">aguardando decisão</div>
        </div>
      </div>

      <div className="dec-note">
        <strong>Como usar:</strong> use os checkboxes na esquerda para selecionar várias linhas e aplicar uma decisão em lote, ou clique nos ícones <span className="mono">✓</span> e <span className="mono">×</span> em cada linha individualmente. Exporte para CSV ao terminar.
      </div>

      {/* TOOLS */}
      <div className="controls">
        <div className="search-wrap">
          <Icon name="search" size={14}/>
          <input placeholder="Filtrar por arquivo, função ou caminho…" value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <div className="select-wrap">
          <select value={fMod} onChange={e=>setFMod(e.target.value)}>
            <option value="">Todos os módulos</option>
            {mods.map(m=><option key={m}>{m}</option>)}
          </select>
        </div>
        <div className="filter-pills">
          <button className={`filter-pill${fStatus===''?' active':''}`} onClick={()=>setFStatus('')}>Todos</button>
          <button className={`filter-pill${fStatus==='pending'?' active':''}`} onClick={()=>setFStatus('pending')}>Pendentes</button>
          <button className={`filter-pill${fStatus==='keep'?' active':''}`} onClick={()=>setFStatus('keep')} style={fStatus==='keep'?{background:'var(--teal)',borderColor:'var(--teal)',color:'#fff'}:{}}>Manter</button>
          <button className={`filter-pill${fStatus==='eval'?' active':''}`} onClick={()=>setFStatus('eval')} style={fStatus==='eval'?{background:'var(--amber)',borderColor:'var(--amber)',color:'#fff'}:{}}>Avaliar</button>
          <button className={`filter-pill${fStatus==='drop'?' active danger':''}`} onClick={()=>setFStatus('drop')}>Descontinuar</button>
        </div>
      </div>

      <div className="dec-tools">
        <span style={{fontSize:11,color:'var(--ink-3)',fontFamily:'DM Mono,monospace'}}>
          {selected.size>0 ? `${selected.size} selecionado(s):` : `${filtered.length} fonte(s) listado(s)`}
        </span>
        <button className="dec-btn keep" disabled={selected.size===0} onClick={()=>applyBulk('keep')} style={selected.size===0?{opacity:0.4,cursor:'not-allowed'}:{}}>
          <Icon name="check" size={12}/> Marcar Manter
        </button>
        <button className="dec-btn" disabled={selected.size===0} onClick={()=>applyBulk('eval')} style={selected.size===0?{opacity:0.4,cursor:'not-allowed'}:{color:'var(--amber)',borderColor:'var(--amber)'}}>
          <span style={{fontFamily:'DM Mono,monospace',fontSize:13,fontWeight:700,lineHeight:1}}>?</span> Marcar Avaliar
        </button>
        <button className="dec-btn drop" disabled={selected.size===0} onClick={()=>applyBulk('drop')} style={selected.size===0?{opacity:0.4,cursor:'not-allowed'}:{}}>
          <Icon name="cross" size={12}/> Marcar Descontinuar
        </button>
        <button className="dec-btn" disabled={selected.size===0} onClick={()=>applyBulk('clear')} style={selected.size===0?{opacity:0.4,cursor:'not-allowed'}:{}}>
          Limpar seleção
        </button>
        <div style={{flex:1}}></div>
        <button className="dec-btn" onClick={clearAll}>Limpar tudo</button>
        <button className="dec-btn primary" onClick={exportCSV}>
          <Icon name="download" size={12}/> Exportar CSV
        </button>
      </div>

      <div className="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th style={{width:36,padding:'10px 0 10px 14px'}}>
                <span className={`dec-checkbox${selected.size===filtered.length&&filtered.length>0?' checked':''}`} onClick={toggleSelectAll}>
                  {selected.size===filtered.length&&filtered.length>0&&<Icon name="check" size={11}/>}
                  {selected.size>0&&selected.size<filtered.length&&<span style={{width:8,height:2,background:'currentColor'}}></span>}
                </span>
              </th>
              <th>Arquivo</th>
              <th>Módulo</th>
              <th style={{textAlign:'right'}}>LOC</th>
              <th style={{textAlign:'center'}}>Hardcodes</th>
              <th style={{textAlign:'center',width:90}}>Status</th>
              <th style={{textAlign:'center',width:80}}>Ações</th>
            </tr>
          </thead>
          <tbody>
            {filtered.length===0&&(
              <tr><td colSpan="7"><div className="empty"><Icon name="search" size={24}/><p>Nenhum registro encontrado.</p></div></td></tr>
            )}
            {filtered.map(r=>{
              const status = decisions[r.caminho] || 'pending';
              const isSel = selected.has(r.caminho);
              return (
                <tr key={r.caminho} className="data-row" style={isSel?{background:'var(--blue-light)'}:{}}>
                  <td style={{padding:'10px 0 10px 14px'}}>
                    <span className={`dec-checkbox${isSel?' checked':''}`} onClick={()=>toggleSelect(r.caminho)}>
                      {isSel&&<Icon name="check" size={11}/>}
                    </span>
                  </td>
                  <td>
                    <div className="file-name">{r.arquivo}</div>
                    {r.principal&&<div className="file-func">{r.principal}</div>}
                  </td>
                  <td><span className="tag">{r.modulo}</span></td>
                  <td className="loc-val">{fmt(r.loc)}</td>
                  <td style={{textAlign:'center'}}>
                    <div style={{display:'flex',gap:4,justifyContent:'center'}}>
                      <SevBadge sev="alta" count={r.hc_alta}/>
                      <SevBadge sev="media" count={r.hc_media}/>
                      {!r.hc_alta&&!r.hc_media&&<span style={{color:'var(--ink-4)',fontSize:11}}>—</span>}
                    </div>
                  </td>
                  <td style={{textAlign:'center'}}>
                    <span className={`dec-status-pill ${status}`}>
                      {status==='keep'?'Manter':status==='drop'?'Desc.':status==='eval'?'Avaliar':'Pendente'}
                      {decisionMeta[r.caminho]&&(
                        <span className="dec-tooltip">
                          <b>{decisionMeta[r.caminho].updated_by}</b><br/>
                          {new Date(decisionMeta[r.caminho].updated_at).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}
                        </span>
                      )}
                    </span>
                  </td>
                  <td>
                    <div className="dec-row-actions" style={{justifyContent:'center'}}>
                      <button className={`dec-action-btn keep${status==='keep'?' active':''}`} title="Manter" onClick={()=>setDecision(r.caminho, status==='keep'?'clear':'keep')}>
                        <Icon name="check" size={12}/>
                      </button>
                      <button className={`dec-action-btn eval${status==='eval'?' active':''}`} title="Avaliar" onClick={()=>setDecision(r.caminho, status==='eval'?'clear':'eval')}>
                        <span style={{fontFamily:'DM Mono,monospace',fontSize:13,fontWeight:700,lineHeight:1}}>?</span>
                      </button>
                      <button className={`dec-action-btn drop${status==='drop'?' active':''}`} title="Descontinuar" onClick={()=>setDecision(r.caminho, status==='drop'?'clear':'drop')}>
                        <Icon name="cross" size={12}/>
                      </button>
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
};

                    <tr className={`data-row${isOpen?' expanded':''}`} onClick={()=>setExpanded(isOpen?null:f.arquivo)}>
                      <td><div className="file-name"><span className="chevron">{isOpen?'▾':'▸'} </span>{f.arquivo}</div></td>
                      <td><span className="tag">{f.modulo}</span></td>
                      {['W0003','W0012','W0019','W0008','W0011'].map(c=>(
                        <td key={c}>
                          {f.codigos[c]
                            ? <span className={`sev ${c==='W0012'||c==='W0019'?'alta':'media'}`}>{f.codigos[c]}</span>
                            : <span style={{color:'var(--ink-4)'}}>—</span>}
                        </td>
                      ))}
                      <td style={{textAlign:'right'}}><span style={{fontFamily:'DM Mono,monospace',fontSize:13,fontWeight:500}}>{f.total}</span></td>
                    </tr>
                    {isOpen && (
                      <tr className="detail-row">
                        <td colSpan={8}>
                          <div className="hits-header">OCORRÊNCIAS {filtro?`(${filtro})`:'— TODAS'}</div>
                          {hitsVisiveis.map((h,i)=>(
                            <div key={i} className="hit-alerta">
                              <span className="hit-line">Ln {h.linha}</span>
                              <span className={`sev ${h.codigo==='W0012'||h.codigo==='W0019'?'alta':'media'}`}>{h.codigo}</span>
                              <span style={{color:'var(--ink-2)'}}>{h.mensagem}</span>
                            </div>
                          ))}
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

const MV_STATUS_OPTS    = ['Avaliar','Confirmado','Ajustado','Excluir'];
const MV_STATUS_OK      = new Set(['Confirmado','Ajustado']);
const MV_VALID_STATUSES = new Set(MV_STATUS_OPTS);

// mapeia status_inicial legado (do preset) para o novo vocabulário
const mapStatusInicial = s => {
  if(MV_VALID_STATUSES.has(s)) return s;
  if(s==='OK') return 'Confirmado';
  return 'Avaliar';
};

const fmtMeta = (updated_by, updated_at) => {
  if(!updated_by && !updated_at) return null;
  let d = '';
  if(updated_at){ try{ d = new Date(updated_at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}); }catch(e){} }
  return `${updated_by||'—'} · ${d||'—'}`;
};

const ParametrosView = ({ mvParams, mvParamsStats, setMvParam }) => {
  const all = window.PARAMETROS_DATA || [];

  const grupos = useMemo(()=>{
    const map = {};
    all.forEach(p=>{ if(!map[p.grupo]) map[p.grupo]=[]; map[p.grupo].push(p); });
    return map;
  // eslint-disable-next-line
  },[]);

  const [filter, setFilter] = useState('todos');
  const [search,  setSearch]  = useState('');

  // drafts: {mv_var: {status, valor_novo}} — edições locais ainda não salvas
  const [drafts, setDrafts] = useState({});

  const getSaved = (mv_var) => {
    const s = mvParams[mv_var]||{};
    return {
      status:    MV_VALID_STATUSES.has(s.status) ? s.status : mapStatusInicial((window.PARAMETROS_DATA||[]).find(p=>p.mv_var===mv_var)?.status_inicial||''),
      valor_novo: s.valor_novo||''
    };
  };

  const getDraft = (mv_var) => {
    if(drafts[mv_var]) return drafts[mv_var];
    return getSaved(mv_var);
  };

  const isDirty = (mv_var) => {
    if(!drafts[mv_var]) return false;
    const saved = getSaved(mv_var);
    const d = drafts[mv_var];
    return d.status !== saved.status || d.valor_novo !== saved.valor_novo;
  };

  const handleDraft = (mv_var, field, value) => {
    setDrafts(prev=>{
      const cur = prev[mv_var] || getSaved(mv_var);
      return {...prev, [mv_var]: {...cur, [field]: value}};
    });
  };

  const handleSave = (mv_var) => {
    const d = drafts[mv_var];
    if(!d) return;
    setMvParam(mv_var, {status: d.status, valor_novo: d.valor_novo});
    setDrafts(prev=>{ const n={...prev}; delete n[mv_var]; return n; });
  };

  const matchesFilter = (p) => {
    const status = getDraft(p.mv_var).status;
    if(filter==='avaliar'     && status!=='Avaliar') return false;
    if(filter==='bloqueantes' && !p.bloqueante)      return false;
    if(search && !p.mv_var.toLowerCase().includes(search.toLowerCase()) &&
       !p.descricao.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  };

  const statusStyle = (status) => {
    if(MV_STATUS_OK.has(status))   return {bg:'#dcfce7',color:'#166534'};
    if(status==='Excluir')          return {bg:'#f1f5f9',color:'#64748b'};
    return {bg:'#fef3c7',color:'#92400e'}; // Avaliar
  };

  return (
    <div className="view active">
      <div className="breadcrumb">Vinci · Parâmetros do Sistema</div>
      <div className="page-header">
        <h1>Parâmetros MV — SX6</h1>
        <p>{mvParamsStats.total} parâmetros ativos · <span style={{color:'#16a34a'}}>{mvParamsStats.atualizados} confirmados</span> · <span style={{color:'#92400e'}}>{mvParamsStats.avaliar} a avaliar</span> · <span style={{color:'#dc2626'}}>{mvParamsStats.bloqueantes} bloqueantes pendentes</span>{mvParamsStats.excluir?` · ${mvParamsStats.excluir} a excluir`:''}</p>
      </div>

      {/* KPIs */}
      <div className="kpi-grid" style={{gridTemplateColumns:'repeat(4,1fr)',marginBottom:24}}>
        <div className="kpi"><div className="kpi-label">Total</div><div className="kpi-value blue">{mvParamsStats.total}</div><div className="kpi-sub">parâmetros</div></div>
        <div className="kpi"><div className="kpi-label">Confirmado / Ajustado</div><div className="kpi-value" style={{color:'#16a34a'}}>{mvParamsStats.atualizados}</div><div className="kpi-sub">prontos</div></div>
        <div className="kpi"><div className="kpi-label">A Avaliar</div><div className="kpi-value amber">{mvParamsStats.avaliar}</div><div className="kpi-sub">pendentes</div></div>
        <div className="kpi"><div className="kpi-label">Bloqueantes</div><div className="kpi-value danger">{mvParamsStats.bloqueantes}</div><div className="kpi-sub">bloqueiam go-live</div></div>
      </div>

      {/* Filtros */}
      <div style={{display:'flex',gap:10,marginBottom:20,flexWrap:'wrap',alignItems:'center'}}>
        {[['todos','Todos'],['avaliar','A Avaliar'],['bloqueantes','Bloqueantes']].map(([f,l])=>(
          <button key={f} onClick={()=>setFilter(f)} style={{
            padding:'5px 14px',borderRadius:6,fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'DM Sans,sans-serif',
            border:`1px solid ${filter===f?'var(--blue)':'var(--border)'}`,
            background:filter===f?'var(--blue)':'var(--surface)',
            color:filter===f?'white':'var(--ink-3)'
          }}>{l}</button>
        ))}
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar parâmetro…"
          style={{padding:'5px 12px',borderRadius:6,border:'1px solid var(--border)',background:'var(--surface)',color:'var(--ink)',fontSize:12,fontFamily:'DM Sans,sans-serif',outline:'none',minWidth:200}}/>
      </div>

      {/* Tabela por grupo */}
      {Object.entries(grupos).map(([grupo, params])=>{
        const visible = params.filter(matchesFilter);
        if(!visible.length) return null;
        return (
          <div key={grupo} className="card" style={{marginBottom:20}}>
            <div className="card-header">
              <div>
                <div className="card-title">{grupo}</div>
                <div className="card-subtitle">{visible.length} parâmetro{visible.length!==1?'s':''}</div>
              </div>
            </div>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead>
                  <tr style={{borderBottom:'2px solid var(--border)'}}>
                    <th style={{padding:'8px 12px',textAlign:'left',fontWeight:700,color:'var(--ink-3)',fontSize:11,whiteSpace:'nowrap'}}>Parâmetro</th>
                    <th style={{padding:'8px 12px',textAlign:'left',fontWeight:700,color:'var(--ink-3)',fontSize:11}}>Descrição</th>
                    <th style={{padding:'8px 12px',textAlign:'left',fontWeight:700,color:'var(--ink-3)',fontSize:11,whiteSpace:'nowrap'}}>Valor Origem</th>
                    <th style={{padding:'8px 12px',textAlign:'left',fontWeight:700,color:'var(--ink-3)',fontSize:11,whiteSpace:'nowrap'}}>Status</th>
                    <th style={{padding:'8px 12px',textAlign:'left',fontWeight:700,color:'var(--ink-3)',fontSize:11,whiteSpace:'nowrap'}}>Valor Novo</th>
                    <th style={{padding:'8px 12px',textAlign:'center',fontWeight:700,color:'var(--ink-3)',fontSize:11}}>🔒</th>
                    <th style={{padding:'8px 12px',textAlign:'center',fontWeight:700,color:'var(--ink-3)',fontSize:11,minWidth:70}}></th>
                  </tr>
                </thead>
                <tbody>
                  {visible.map((p,i)=>{
                    const draft    = getDraft(p.mv_var);
                    const dirty    = isDirty(p.mv_var);
                    const saved    = mvParams[p.mv_var]||{};
                    const sStyle   = statusStyle(draft.status);
                    const metaTip  = fmtMeta(saved.updated_by, saved.updated_at);
                    return (
                      <tr key={p.mv_var} style={{borderBottom:'1px solid var(--border)',background:dirty?'rgba(59,130,246,0.04)':i%2===0?'transparent':'var(--surface-2,rgba(0,0,0,0.02))'}}>
                        <td style={{padding:'8px 12px',fontFamily:'DM Mono,monospace',fontWeight:600,fontSize:11,color:'var(--blue)',whiteSpace:'nowrap'}}>{p.mv_var}</td>
                        <td style={{padding:'8px 12px',color:'var(--ink)',maxWidth:240}}>{p.descricao}</td>
                        <td style={{padding:'8px 12px',fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--ink-3)',maxWidth:160,wordBreak:'break-all'}}>
                          {p.valor_origem||<span style={{opacity:0.35,fontStyle:'italic'}}>vazio</span>}
                        </td>
                        <td style={{padding:'8px 12px',whiteSpace:'nowrap'}}>
                          <select value={draft.status} onChange={e=>handleDraft(p.mv_var,'status',e.target.value)}
                            style={{fontSize:11,padding:'3px 6px',borderRadius:4,border:`1px solid ${dirty?'var(--blue)':'var(--border)'}`,background:sStyle.bg,color:sStyle.color,fontFamily:'DM Sans,sans-serif',fontWeight:600,cursor:'pointer'}}>
                            {MV_STATUS_OPTS.map(s=><option key={s} value={s}>{s}</option>)}
                          </select>
                        </td>
                        <td style={{padding:'8px 12px',minWidth:160}}>
                          <div style={{position:'relative',display:'flex',alignItems:'center',gap:4}}>
                            <input value={draft.valor_novo}
                              onChange={e=>handleDraft(p.mv_var,'valor_novo',e.target.value)}
                              placeholder="novo valor…"
                              style={{fontSize:11,padding:'3px 8px',borderRadius:4,border:`1px solid ${dirty?'var(--blue)':'var(--border)'}`,background:'var(--surface)',color:'var(--ink)',fontFamily:'DM Mono,monospace',flex:1,minWidth:120,boxSizing:'border-box'}}/>
                            {metaTip && !dirty && (
                              <span title={metaTip} style={{cursor:'help',color:'var(--ink-4)',fontSize:13,flexShrink:0,lineHeight:1}}>ℹ</span>
                            )}
                          </div>
                        </td>
                        <td style={{padding:'8px 12px',textAlign:'center'}}>
                          {p.bloqueante ? <span title="Bloqueante — deve ser resolvido antes do go-live" style={{color:'#dc2626',fontSize:14}}>●</span> : <span style={{color:'var(--ink-4)',fontSize:10}}>—</span>}
                        </td>
                        <td style={{padding:'6px 8px',textAlign:'center'}}>
                          {dirty ? (
                            <button onClick={()=>handleSave(p.mv_var)} style={{
                              fontSize:11,padding:'4px 10px',borderRadius:5,border:'none',cursor:'pointer',fontFamily:'DM Sans,sans-serif',fontWeight:700,
                              background:'var(--blue)',color:'white',whiteSpace:'nowrap'
                            }}>Salvar</button>
                          ) : saved.updated_at ? (
                            <span style={{color:'var(--ink-4)',fontSize:18,lineHeight:1}} title={metaTip||''}>✓</span>
                          ) : null}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      })}
    </div>
  );
};

const App = () => {
  const [activeView, setActiveView] = useState('overview');
  const [catalogModule, setCatalogModule] = useState('');
  const [catalogCategoria, setCatalogCategoria] = useState('');
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const [decisions, setDecisions] = useState(()=>{
    try { return JSON.parse(localStorage.getItem('vinci_decisions')||'{}'); } catch(e) { return {}; }
  });
  const [decisionMeta, setDecisionMeta] = useState({});
  const [mvParams, setMvParamsState] = useState(()=>{
    try { return JSON.parse(localStorage.getItem('vinci_mvparams')||'{}'); } catch(e) { return {}; }
  });
  const [currentUser, setCurrentUser]       = useState(null);
  const [authLoading, setAuthLoading]       = useState(true);
  const [needsPasswordSet, setNeedsPasswordSet] = useState(false);
  const [syncStatus, setSyncStatus]         = useState('idle'); // 'idle'|'syncing'|'ok'|'error'
  const [darkMode, setDarkMode]             = useState(()=>localStorage.getItem('vinci_theme')==='dark');

  // Persiste decisões no localStorage sempre que mudam
  useEffect(()=>{
    localStorage.setItem('vinci_decisions', JSON.stringify(decisions));
  },[decisions]);

  // Persiste parâmetros no localStorage
  useEffect(()=>{
    localStorage.setItem('vinci_mvparams', JSON.stringify(mvParams));
  },[mvParams]);

  // Aplica dark mode no <html> e persiste preferência
  useEffect(()=>{
    document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
    localStorage.setItem('vinci_theme', darkMode ? 'dark' : 'light');
  },[darkMode]);

  // Supabase Auth — session management
  useEffect(()=>{
    if(!sb){ setAuthLoading(false); return; }
    // Captura o tipo do link ANTES do Supabase consumir o hash
    const isInvite = window.location.hash.includes('type=invite') ||
                     window.location.hash.includes('type=recovery');
    sb.auth.getSession().then(({data:{session}})=>{
      setCurrentUser(session?.user||null);
      if(session?.user && isInvite) setNeedsPasswordSet(true);
      setAuthLoading(false);
    });
    const {data:{subscription}} = sb.auth.onAuthStateChange((_,session)=>{
      setCurrentUser(session?.user||null);
    });
    return ()=>subscription.unsubscribe();
  // eslint-disable-next-line
  },[]);

  // Carrega decisões do Supabase na montagem e semeia se vazio
  useEffect(()=>{
    if(!sb) return;
    setSyncStatus('syncing');
    sb.from('decisions').select('source_path,decision,updated_by,updated_at')
      .then(({data,error})=>{
        if(error){ setSyncStatus('error'); return; }
        if(!data||data.length===0){
          // Supabase vazio — semeia com presets do localStorage
          const local = (()=>{ try{ return JSON.parse(localStorage.getItem('vinci_decisions')||'{}'); }catch(e){ return {}; }})();
          const rows = Object.entries(local).map(([p,d])=>({source_path:p,decision:d,updated_at:new Date().toISOString(),updated_by:'seed'}));
          if(rows.length) sb.from('decisions').upsert(rows,{onConflict:'source_path'}).then(()=>setSyncStatus('ok'));
          else setSyncStatus('ok');
        } else {
          setDecisions(prev=>{
            const next={...prev};
            data.forEach(r=>{ next[r.source_path]=r.decision; });
            return next;
          });
          setDecisionMeta(prev=>{
            const next={...prev};
            data.forEach(r=>{ if(r.updated_by||r.updated_at) next[r.source_path]={updated_by:r.updated_by,updated_at:r.updated_at}; });
            return next;
          });
          setSyncStatus('ok');
        }
      });
  // eslint-disable-next-line
  },[]);

  // Carrega parâmetros MV do Supabase na montagem
  useEffect(()=>{
    if(!sb) return;
    sb.from('mv_parameters').select('mv_var,status,valor_novo,responsavel,updated_by,updated_at')
      .then(({data,error})=>{
        if(error||!data||!data.length) return;
        setMvParamsState(prev=>{
          const next={...prev};
          data.forEach(r=>{
            next[r.mv_var]={
              status:r.status,
              valor_novo:r.valor_novo||'',
              responsavel:r.responsavel||'',
              updated_by:r.updated_by||'',
              updated_at:r.updated_at||''
            };
          });
          return next;
        });
      });
  // eslint-disable-next-line
  },[]);

  const upsertSb = async (path, decision) => {
    if(!sb) return;
    setSyncStatus('syncing');
    if(decision==='clear'){
      const {error} = await sb.from('decisions').delete().eq('source_path',path);
      if(!error) setDecisionMeta(prev=>{ const n={...prev}; delete n[path]; return n; });
      setSyncStatus(error?'error':'ok');
    } else {
      const now = new Date().toISOString();
      const by = currentUser?.user_metadata?.full_name||currentUser?.email||'anônimo';
      const {error} = await sb.from('decisions').upsert(
        {source_path:path,decision,updated_at:now,updated_by:by},
        {onConflict:'source_path'}
      );
      if(!error) setDecisionMeta(prev=>({...prev,[path]:{updated_by:by,updated_at:now}}));
      setSyncStatus(error?'error':'ok');
    }
  };

  const setDecision = (id, status) => {
    setDecisions(prev=>{
      const next = {...prev};
      if(status==='clear') delete next[id];
      else next[id] = status;
      return next;
    });
    upsertSb(id, status);
  };

  const bulkSet = async (ids, status) => {
    setDecisions(prev=>{
      const next = {...prev};
      ids.forEach(id=>{ if(status==='clear') delete next[id]; else next[id]=status; });
      return next;
    });
    if(!sb||!ids.length) return;
    setSyncStatus('syncing');
    if(status==='clear'){
      const {error} = await sb.from('decisions').delete().in('source_path',ids);
      if(!error) setDecisionMeta(prev=>{ const n={...prev}; ids.forEach(id=>delete n[id]); return n; });
      setSyncStatus(error?'error':'ok');
    } else {
      const now = new Date().toISOString();
      const by = currentUser?.user_metadata?.full_name||currentUser?.email||'anônimo';
      const rows = ids.map(id=>({source_path:id,decision:status,updated_at:now,updated_by:by}));
      const {error} = await sb.from('decisions').upsert(rows,{onConflict:'source_path'});
      if(!error) setDecisionMeta(prev=>{ const n={...prev}; ids.forEach(id=>{ n[id]={updated_by:by,updated_at:now}; }); return n; });
      setSyncStatus(error?'error':'ok');
    }
  };

  // fields = {status, valor_novo} — recebe o conjunto completo ao salvar
  const setMvParam = async (mvVar, fields) => {
    const now = new Date().toISOString();
    const by  = currentUser?.user_metadata?.full_name||currentUser?.email||'anônimo';
    setMvParamsState(prev=>{
      const cur = prev[mvVar]||{};
      return {...prev,[mvVar]:{...cur,...fields, updated_by:by, updated_at:now}};
    });
    if(!sb) return;
    setSyncStatus('syncing');
    const row = { mv_var:mvVar, ...fields, updated_at:now, updated_by:by };
    const {error} = await sb.from('mv_parameters').upsert(row,{onConflict:'mv_var'});
    setSyncStatus(error?'error':'ok');
  };

  const handleLogout = () => { sb.auth.signOut(); };

  const decisionStats = useMemo(()=>{
    // Considera apenas decisões de fontes que existem no catálogo atual
    const validPaths = new Set(CATALOGO_TODOS.map(r=>r.caminho));
    let keep=0, drop=0, evaluate=0;
    Object.entries(decisions).forEach(([path,s])=>{
      if(!validPaths.has(path)) return;
      if(s==='keep') keep++;
      else if(s==='drop') drop++;
      else if(s==='eval') evaluate++;
    });
    return {keep, drop, evaluate, decided: keep+drop+evaluate};
  },[decisions]);

  // Auto-limpa decisões órfãs (paths que não existem mais no catálogo) na 1ª carga
  useEffect(()=>{
    const validPaths = new Set(CATALOGO_TODOS.map(r=>r.caminho));
    const orphans = Object.keys(decisions).filter(p=>!validPaths.has(p));
    if(orphans.length){
      setDecisions(prev=>{
        const next = {...prev};
        orphans.forEach(p=>delete next[p]);
        return next;
      });
    }

  },[]);

  // Tweaks protocol
  useEffect(()=>{

      if(e.data?.type==='__activate_edit_mode') setTweaksVisible(true);

    setTweaks(prev=>{

      return next;
    });
  };

  const mvParamsStats = useMemo(()=>{
    const all = window.PARAMETROS_DATA||[];
    let atualizados=0, avaliar=0, excluir=0, bloqueantes=0;
    all.forEach(p=>{
      const saved  = mvParams[p.mv_var];

      if(MV_STATUS_OK.has(status))         atualizados++;
      else if(status==='Excluir')           excluir++;
      else                                  avaliar++;

              <div style={{display:'flex',gap:6}}>
                {['light','dark'].map(t=>(
                  <button key={t} onClick={()=>setTweak('theme',t)} style={{flex:1,padding:'6px 0',borderRadius:6,border:`1px solid ${tweaks.theme===t?'var(--blue)':'var(--border)'}`,background:tweaks.theme===t?'var(--blue-light)':'var(--surface)',color:tweaks.theme===t?'var(--blue)':'var(--ink-3)',fontSize:12,cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>{t==='light'?'Claro':'Escuro'}</button>
                ))}
              </div>
            </div>
            <div>
              <div style={{fontSize:11,fontWeight:600,color:'var(--ink-3)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:6}}>Densidade</div>
              <div style={{display:'flex',gap:6}}>
                {['compact','normal','spacious'].map(d=>(
                  <button key={d} onClick={()=>setTweak('density',d)} style={{flex:1,padding:'6px 0',borderRadius:6,border:`1px solid ${tweaks.density===d?'var(--blue)':'var(--border)'}`,background:tweaks.density===d?'var(--blue-light)':'var(--surface)',color:tweaks.density===d?'var(--blue)':'var(--ink-3)',fontSize:10,cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>{d==='compact'?'Compact':d==='normal'?'Normal':'Amplo'}</button>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
